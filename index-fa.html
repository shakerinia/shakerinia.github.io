    .btns{

    a.btn{

      text-decoration: none;

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
    // GoatCounter: button tracking removed (buttons deleted)
    // Ensure disabled buttons never overflow: shrink font-size as needed.

    function fitOneLine(el, minPx = 12) {
      if (!el) return;

      // Reset to CSS-defined size first
      el.style.fontSize = '';

      // Only proceed if it overflows
      const computed = window.getComputedStyle(el);
      let fs = parseFloat(computed.fontSize);
      if (!Number.isFinite(fs)) return;

      // Guard: avoid unnecessary loops
      const maxSteps = 20;
      let step = 0;

      // Use scrollWidth vs clientWidth for one-line overflow check
      while (el.scrollWidth > el.clientWidth && fs > minPx && step < maxSteps) {
        fs -= 0.5;
        el.style.fontSize = fs + 'px';
        step++;
      }
    }

    function fitDisabledButtons() {
      document.querySelectorAll('.btn.btn-disabled').forEach((el) => fitOneLine(el, 12));
    }

    // Run after layout, and on resize
    window.addEventListener('load', () => requestAnimationFrame(fitDisabledButtons));
    window.addEventListener('resize', () => requestAnimationFrame(fitDisabledButtons));
  </script>
